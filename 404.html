<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>PMTI | 页面不存在</title>
  <style>
    :root {
      --bg: #f7f0e4;
      --panel: #fffdf8;
      --text: #20262c;
      --muted: #6b7280;
      --line: #eadfc9;
      --accent: #1f4f8a;
      --shadow: 0 18px 44px rgba(75, 54, 22, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #fff8ee 0%, #f7f0e4 100%);
      color: var(--text);
      font-family: "Avenir Next", "Trebuchet MS", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .card {
      max-width: 680px;
      width: 100%;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    h1, p { margin: 0; }
    h1 {
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }
    p {
      margin-top: 14px;
      line-height: 1.9;
      color: var(--muted);
      font-size: 15px;
    }
    a {
      display: inline-flex;
      align-items: center;
      margin-top: 22px;
      padding: 12px 18px;
      border-radius: 14px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>这条支线暂时不存在。</h1>
    <p>你访问的页面没有找到。返回首页继续进行 PMTI 测试会更顺一点。</p>
    <p>本项目为非官方、非商用同人静态页，仅供娱乐与角色设定创作参考。</p>
    <a href="./index.html">返回首页</a>
  </main>
</body>
</html>
